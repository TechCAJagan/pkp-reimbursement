<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PKP - Employees</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:#f4f2ec;display:flex;min-height:100vh}
.sidebar{width:240px;background:#1a1a2e;min-height:100vh;position:fixed;top:0;left:0;display:flex;flex-direction:column;padding:24px 0}
.logo{padding:0 20px 20px;border-bottom:1px solid rgba(201,168,76,0.2)}
.logo-badge{background:#c9a84c;color:#1a1a2e;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:1px;display:inline-block;margin-bottom:8px}
.logo h2{font-family:"DM Serif Display",serif;color:#faf8f3;font-size:18px;line-height:1.2}
.logo h2 em{color:#c9a84c;font-style:italic}
.nav{padding:16px 0}
.nav a{display:flex;align-items:center;gap:10px;padding:9px 20px;color:rgba(250,248,243,0.6);text-decoration:none;font-size:13px;border-left:3px solid transparent;transition:all 0.15s}
.nav a:hover{color:#faf8f3;background:rgba(201,168,76,0.06)}
.nav a.active{color:#c9a84c;background:rgba(201,168,76,0.1);border-left-color:#c9a84c;font-weight:500}
.sidebar-foot{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(201,168,76,0.1)}
.ucard{display:flex;align-items:center;gap:10px}
.uavatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#c9a84c,#e8c96a);display:flex;align-items:center;justify-content:center;font-weight:700;color:#1a1a2e;font-size:14px;flex-shrink:0}
.uname{font-size:13px;font-weight:600;color:#faf8f3}
.urole{font-size:11px;color:#8888a0}
.logout-btn{background:none;border:none;color:#8888a0;font-size:16px;cursor:pointer;margin-left:auto;padding:4px}
.logout-btn:hover{color:#c9a84c}
.main{margin-left:240px;flex:1;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid #eceae3;height:60px;display:flex;align-items:center;padding:0 32px;gap:16px;position:sticky;top:0;z-index:50}
.topbar h1{font-family:"DM Serif Display",serif;font-size:20px;color:#1a1a2e;flex:1}
.page{padding:28px 32px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid #eceae3}
.stat-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#8888a0;margin-bottom:8px}
.stat-val{font-family:"DM Serif Display",serif;font-size:28px;color:#1a1a2e}
.card{background:#fff;border-radius:12px;border:1px solid #eceae3;overflow:hidden}
.toolbar{padding:14px 18px;border-bottom:1px solid #eceae3;display:flex;gap:10px;flex-wrap:wrap}
.toolbar input{flex:1;min-width:180px;padding:8px 12px;border:1px solid #eceae3;border-radius:7px;font-family:"DM Sans",sans-serif;font-size:13px;outline:none}
.toolbar input:focus{border-color:#c9a84c}
.toolbar select{padding:8px 12px;border:1px solid #eceae3;border-radius:7px;font-family:"DM Sans",sans-serif;font-size:13px;background:#fff;outline:none;cursor:pointer}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:#8888a0;background:#faf8f3;border-bottom:1px solid #eceae3;white-space:nowrap}
td{padding:12px 14px;font-size:13px;color:#1a1a2e;border-bottom:1px solid #f0ede5}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf6}
.empid{font-family:monospace;font-size:11px;color:#8888a0}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#c9a84c,#e8c96a);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#1a1a2e;margin-right:8px;vertical-align:middle}
.rbadge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.r-EMPLOYEE{background:#e8f4fd;color:#2b6cb0}
.r-MANAGER{background:#e8f8f0;color:#276749}
.r-FINANCE_MGR{background:#fef3e2;color:#9c6000}
.r-ACCOUNTS{background:#f3e8ff;color:#6b46c1}
.r-ADMIN{background:#fee2e2;color:#c53030}
.son{color:#065f46;font-size:12px;font-weight:600}
.soff{color:#991b1b;font-size:12px;font-weight:600}
.btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #eceae3;background:#fff;color:#1a1a2e;margin-right:4px;transition:all 0.15s;font-family:"DM Sans",sans-serif}
.btn:hover{border-color:#c9a84c;background:rgba(201,168,76,0.07)}
.btn-d{border-color:#fca5a5;color:#991b1b;background:#fff5f5}
.btn-d:hover{background:#fee2e2}
.btn-pri{background:#1a1a2e;color:#faf8f3;border:none;border-radius:8px;padding:8px 16px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.2s}
.btn-pri:hover{background:#2d2d4e}
.empty{padding:50px;text-align:center;color:#8888a0;font-size:14px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-hdr h3{font-family:"DM Serif Display",serif;font-size:17px;color:#1a1a2e}
.ghost{background:none;border:1px solid #eceae3;border-radius:7px;padding:7px 14px;font-family:"DM Sans",sans-serif;font-size:12px;color:#2d2d4e;cursor:pointer;transition:all 0.15s}
.ghost:hover{border-color:#c9a84c;background:rgba(201,168,76,0.07)}
.overlay{position:fixed;inset:0;background:rgba(26,26,46,0.55);z-index:200;display:none;align-items:center;justify-content:center}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:18px;width:500px;max-width:94vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(26,26,46,0.2)}
.mhdr{padding:22px 26px 0;display:flex;align-items:center;justify-content:space-between}
.mtitle{font-family:"DM Serif Display",serif;font-size:19px;color:#1a1a2e}
.mclose{background:none;border:none;font-size:20px;color:#8888a0;cursor:pointer;line-height:1;padding:4px}
.mclose:hover{color:#1a1a2e}
.mbody{padding:18px 26px}
.mfoot{padding:14px 26px 22px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid #eceae3;margin-top:4px}
.fg{display:grid;gap:14px}
.fg2{grid-template-columns:1fr 1fr}
.s2{grid-column:span 2}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:#2d2d4e}
.req{color:#c9a84c}
.field input,.field select{width:100%;padding:9px 12px;border:1.5px solid #eceae3;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:13px;color:#1a1a2e;background:#fff;outline:none;transition:border-color 0.2s}
.field input:focus,.field select:focus{border-color:#c9a84c}
.btn-cxl{padding:9px 18px;border:1.5px solid #eceae3;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:13px;color:#2d2d4e;background:#fff;cursor:pointer}
.btn-cxl:hover{border-color:#c9a84c}
.btn-sav{padding:9px 20px;background:#1a1a2e;color:#faf8f3;border:none;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.btn-sav:hover{background:#2d2d4e}
.btn-sav:disabled{opacity:0.6;cursor:default}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:10px;font-size:13px;font-family:"DM Sans",sans-serif;z-index:999;opacity:0;transform:translateY(16px);transition:all 0.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.t-ok{background:#065f46;color:#fff}
.t-err{background:#991b1b;color:#fff}
.t-info{background:#1a1a2e;color:#faf8f3}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-badge">PKP</div>
    <h2>Reimburse<br><em>ment</em></h2>
  </div>
  <nav class="nav">
    <a href="dashboard.html">&#128202; Dashboard</a>
    <a href="employees.html" class="active">&#128101; User Management</a>
    <a href="#">&#128193; Reimb. Types</a>
    <a href="#">&#9881; System Config</a>
    <a href="#">&#128203; All Claims</a>
    <a href="#">&#128200; Reports</a>
  </nav>
  <div class="sidebar-foot">
    <div class="ucard">
      <div class="uavatar" id="uAvatar">A</div>
      <div>
        <div class="uname" id="uName">Admin</div>
        <div class="urole">Administrator</div>
      </div>
      <button class="logout-btn" onclick="doLogout()">&#9211;</button>
    </div>
  </div>
</aside>

<main class="main">
  <header class="topbar">
    <h1>Employees</h1>
    <button class="btn-pri" onclick="openAdd()">+ Add Employee</button>
  </header>
  <div class="page">

    <div class="stats">
      <div class="stat"><div class="stat-lbl">Total</div><div class="stat-val" id="sTotal">-</div></div>
      <div class="stat"><div class="stat-lbl">Active</div><div class="stat-val" id="sActive">-</div></div>
      <div class="stat"><div class="stat-lbl">Inactive</div><div class="stat-val" id="sInactive">-</div></div>
      <div class="stat"><div class="stat-lbl">Departments</div><div class="stat-val" id="sDepts">-</div></div>
    </div>

    <div class="sec-hdr">
      <h3>All Employees</h3>
      <button class="ghost" onclick="loadAll()">Refresh</button>
    </div>

    <div class="card">
      <div class="toolbar">
        <input type="text" id="srch" placeholder="Search name, email, department..." oninput="doFilter()">
        <select id="fRole" onchange="doFilter()">
          <option value="">All Roles</option>
          <option value="EMPLOYEE">Employee</option>
          <option value="MANAGER">Manager</option>
          <option value="FINANCE_MGR">Finance Manager</option>
          <option value="ACCOUNTS">Accounts</option>
          <option value="ADMIN">Admin</option>
        </select>
        <select id="fStatus" onchange="doFilter()">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>Employee</th><th>ID</th><th>Email</th><th>Role</th>
              <th>Department</th><th>Manager</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="tBody">
            <tr><td colspan="8"><div class="empty">Loading...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div class="overlay" id="modal">
  <div class="modal">
    <div class="mhdr">
      <div class="mtitle" id="mTitle">Add Employee</div>
      <button class="mclose" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="mbody">
      <input type="hidden" id="eId">
      <div class="fg fg2">
        <div class="field s2">
          <label>Full Name <span class="req">*</span></label>
          <input type="text" id="eName" placeholder="e.g. Ravi Kumar">
        </div>
        <div class="field">
          <label>Email <span class="req">*</span></label>
          <input type="email" id="eEmail" placeholder="ravi@pkpassociates.com">
        </div>
        <div class="field">
          <label id="ePwdLabel">Password <span class="req">*</span></label>
          <input type="text" id="ePwd" placeholder="Set a password">
        </div>
        <div class="field">
          <label>Role <span class="req">*</span></label>
          <select id="eRole" onchange="toggleMgr()">
            <option value="">Select Role</option>
            <option value="EMPLOYEE">Employee</option>
            <option value="MANAGER">Manager</option>
            <option value="FINANCE_MGR">Finance Manager</option>
            <option value="ACCOUNTS">Accounts Team</option>
            <option value="ADMIN">Admin</option>
          </select>
        </div>
        <div class="field">
          <label>Department</label>
          <input type="text" id="eDept" placeholder="e.g. Audit, Tax, Admin">
        </div>
        <div class="field s2" id="mgrRow">
          <label>Reporting Manager</label>
          <select id="eMgr"><option value="">No Manager</option></select>
        </div>
        <div class="field" id="statusRow" style="display:none">
          <label>Status</label>
          <select id="eStatus">
            <option value="TRUE">Active</option>
            <option value="FALSE">Inactive</option>
          </select>
        </div>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn-cxl" onclick="closeModal()">Cancel</button>
      <button class="btn-sav" id="saveBtn" onclick="doSave()">Add Employee</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var API = "https://script.google.com/macros/s/AKfycbwbUXVKUKAFb7DWnkpsLDUEJsK4_cepH867tnCaZVdWrva6W94fBjpmAWToQbnVR7PIgg/exec";
var allEmp = [];
var sess = {};
var tok = "";

try {
  sess = JSON.parse(sessionStorage.getItem("pkp_user") || "{}");
  tok = sessionStorage.getItem("pkp_token") || "";
} catch(e) {}

if (!sess.role) { window.location.href = "index.html"; }

document.getElementById("uAvatar").textContent = (sess.name || "A").charAt(0).toUpperCase();
document.getElementById("uName").textContent = sess.name || "Admin";

function doLogout() { sessionStorage.clear(); window.location.href = "index.html"; }

function toast(msg, type) {
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show t-" + (type || "info");
  setTimeout(function() { el.className = "toast"; }, 3500);
}

function api(params, cb) {
  var name = "pkp" + Date.now() + Math.floor(Math.random() * 9999);
  var done = false;

  var timer = setTimeout(function() {
    if (!done) { done = true; cleanup(); cb({ error: "Timed out. Please try again." }); }
  }, 20000);

  function cleanup() {
    delete window[name];
    var s = document.getElementById("s_" + name);
    if (s) { s.parentNode.removeChild(s); }
  }

  window[name] = function(data) {
    if (!done) { done = true; clearTimeout(timer); cleanup(); cb(data); }
  };

  var q = "callback=" + encodeURIComponent(name) + "&token=" + encodeURIComponent(tok);
  for (var k in params) {
    if (Object.prototype.hasOwnProperty.call(params, k)) {
      q += "&" + encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
    }
  }

  var sc = document.createElement("script");
  sc.id = "s_" + name;
  sc.src = API + "?" + q;
  sc.onerror = function() {
    if (!done) { done = true; clearTimeout(timer); cleanup(); cb({ error: "Network error." }); }
  };
  document.body.appendChild(sc);
}

function loadAll() {
  document.getElementById("tBody").innerHTML = '<tr><td colspan="8"><div class="empty">Loading...</div></td></tr>';
  api({ action: "getEmployees" }, function(res) {
    if (res.error) {
      toast(res.error, "err");
      document.getElementById("tBody").innerHTML = '<tr><td colspan="8"><div class="empty">' + res.error + '</div></td></tr>';
      return;
    }
    allEmp = res.employees || [];
    updateStats();
    fillMgrDrop();
    render(allEmp);
  });
}

function updateStats() {
  var act = 0;
  var depts = {};
  for (var i = 0; i < allEmp.length; i++) {
    if (String(allEmp[i].isActive).toUpperCase() === "TRUE") act++;
    if (allEmp[i].department) depts[allEmp[i].department] = 1;
  }
  document.getElementById("sTotal").textContent = allEmp.length;
  document.getElementById("sActive").textContent = act;
  document.getElementById("sInactive").textContent = allEmp.length - act;
  document.getElementById("sDepts").textContent = Object.keys(depts).length || "-";
}

function fillMgrDrop() {
  var sel = document.getElementById("eMgr");
  sel.innerHTML = '<option value="">No Manager</option>';
  for (var i = 0; i < allEmp.length; i++) {
    var e = allEmp[i];
    if (e.role === "MANAGER" || e.role === "ADMIN" || e.role === "FINANCE_MGR") {
      var opt = document.createElement("option");
      opt.value = e.id;
      opt.textContent = e.name + " (" + e.role + ")";
      sel.appendChild(opt);
    }
  }
}

function rLabel(r) {
  return { EMPLOYEE:"Employee", MANAGER:"Manager", FINANCE_MGR:"Finance Mgr", ACCOUNTS:"Accounts", ADMIN:"Admin" }[r] || r;
}

function render(list) {
  var tb = document.getElementById("tBody");
  if (!list || list.length === 0) {
    tb.innerHTML = '<tr><td colspan="8"><div class="empty">No employees found.</div></td></tr>';
    return;
  }
  var mmap = {};
  for (var i = 0; i < allEmp.length; i++) mmap[allEmp[i].id] = allEmp[i].name;

  var rows = "";
  for (var i = 0; i < list.length; i++) {
    var e = list[i];
    var active = String(e.isActive).toUpperCase() === "TRUE";
    var init = (e.name || "?").charAt(0).toUpperCase();
    var mgr = e.managerId && mmap[e.managerId] ? mmap[e.managerId] : "-";
    var statusSpan = active
      ? '<span class="son">&#11044; Active</span>'
      : '<span class="soff">&#11044; Inactive</span>';
    var togLabel = active ? "Deactivate" : "Activate";
    var empId = e.id.replace(/'/g, "");

    rows += "<tr>";
    rows += "<td><span class='avatar'>" + init + "</span>" + (e.name || "-") + "</td>";
    rows += "<td><span class='empid'>" + e.id + "</span></td>";
    rows += "<td>" + (e.email || "-") + "</td>";
    rows += "<td><span class='rbadge r-" + e.role + "'>" + rLabel(e.role) + "</span></td>";
    rows += "<td>" + (e.department || "-") + "</td>";
    rows += "<td>" + mgr + "</td>";
    rows += "<td>" + statusSpan + "</td>";
    rows += "<td>";
    rows += "<button class='btn' onclick="editEmp('" + empId + "')">Edit</button>";
    rows += "<button class='btn btn-d' onclick="togActive('" + empId + "'," + active + ")">" + togLabel + "</button>";
    rows += "</td></tr>";
  }
  tb.innerHTML = rows;
}

function doFilter() {
  var q = (document.getElementById("srch").value || "").toLowerCase();
  var rf = document.getElementById("fRole").value;
  var sf = document.getElementById("fStatus").value;
  var out = [];
  for (var i = 0; i < allEmp.length; i++) {
    var e = allEmp[i];
    var active = String(e.isActive).toUpperCase() === "TRUE";
    var mq = !q ||
      (e.name || "").toLowerCase().indexOf(q) >= 0 ||
      (e.email || "").toLowerCase().indexOf(q) >= 0 ||
      (e.department || "").toLowerCase().indexOf(q) >= 0 ||
      (e.id || "").toLowerCase().indexOf(q) >= 0;
    var mr = !rf || e.role === rf;
    var ms = !sf || (sf === "active" && active) || (sf === "inactive" && !active);
    if (mq && mr && ms) out.push(e);
  }
  render(out);
}

function openAdd() {
  document.getElementById("mTitle").textContent = "Add New Employee";
  document.getElementById("eId").value = "";
  document.getElementById("eName").value = "";
  document.getElementById("eEmail").value = "";
  document.getElementById("ePwd").value = "";
  document.getElementById("eRole").value = "";
  document.getElementById("eDept").value = "";
  document.getElementById("eMgr").value = "";
  document.getElementById("ePwdLabel").innerHTML = "Password <span class='req'>*</span>";
  document.getElementById("statusRow").style.display = "none";
  document.getElementById("saveBtn").textContent = "Add Employee";
  toggleMgr();
  document.getElementById("modal").className = "overlay on";
  setTimeout(function() { document.getElementById("eName").focus(); }, 200);
}

function editEmp(id) {
  var emp = null;
  for (var i = 0; i < allEmp.length; i++) {
    if (allEmp[i].id === id) { emp = allEmp[i]; break; }
  }
  if (!emp) return;
  document.getElementById("mTitle").textContent = "Edit Employee";
  document.getElementById("eId").value = emp.id;
  document.getElementById("eName").value = emp.name || "";
  document.getElementById("eEmail").value = emp.email || "";
  document.getElementById("ePwd").value = "";
  document.getElementById("eRole").value = emp.role || "";
  document.getElementById("eDept").value = emp.department || "";
  document.getElementById("eMgr").value = emp.managerId || "";
  document.getElementById("eStatus").value = String(emp.isActive).toUpperCase() === "TRUE" ? "TRUE" : "FALSE";
  document.getElementById("ePwdLabel").innerHTML = "New Password <small style='color:#8888a0;font-size:10px;text-transform:none'>(blank = keep current)</small>";
  document.getElementById("statusRow").style.display = "flex";
  document.getElementById("saveBtn").textContent = "Save Changes";
  toggleMgr();
  document.getElementById("modal").className = "overlay on";
}

function closeModal() {
  document.getElementById("modal").className = "overlay";
}

function toggleMgr() {
  var r = document.getElementById("eRole").value;
  document.getElementById("mgrRow").style.display = r === "ADMIN" ? "none" : "block";
}

function doSave() {
  var eid  = document.getElementById("eId").value;
  var name = document.getElementById("eName").value.trim();
  var mail = document.getElementById("eEmail").value.trim();
  var pwd  = document.getElementById("ePwd").value.trim();
  var role = document.getElementById("eRole").value;
  var dept = document.getElementById("eDept").value.trim();
  var mgr  = document.getElementById("eMgr").value;
  var stat = document.getElementById("eStatus").value;

  if (!name || !mail || !role) { toast("Please fill Name, Email and Role.", "err"); return; }
  if (!eid && !pwd) { toast("Password is required for new employee.", "err"); return; }

  var btn = document.getElementById("saveBtn");
  btn.disabled = true;
  btn.textContent = "Saving...";

  var p = {};
  if (eid) {
    p.action = "updateEmployee"; p.employeeId = eid;
    p.Name = name; p.Email = mail; p.Role = role;
    p.Department = dept; p.ManagerID = mgr; p.IsActive = stat;
    if (pwd) p.Password = pwd;
  } else {
    p.action = "addEmployee";
    p.name = name; p.email = mail; p.password = pwd;
    p.role = role; p.department = dept; p.managerId = mgr;
  }

  api(p, function(res) {
    btn.disabled = false;
    btn.textContent = eid ? "Save Changes" : "Add Employee";
    if (res.error) { toast(res.error, "err"); return; }
    toast(eid ? "Employee updated!" : "Employee added! ID: " + res.id, "ok");
    closeModal();
    loadAll();
  });
}

function togActive(id, isActive) {
  var msg = isActive ? "Deactivate this employee?" : "Activate this employee?";
  if (!confirm(msg)) return;
  api({ action: "updateEmployee", employeeId: id, IsActive: isActive ? "FALSE" : "TRUE" }, function(res) {
    if (res.error) { toast(res.error, "err"); return; }
    toast(isActive ? "Employee deactivated." : "Employee activated.", "ok");
    loadAll();
  });
}

document.getElementById("modal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

loadAll();
</script>
</body>
</html>
