<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PKP Reimbursement - Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:#1a1a2e;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;width:100%;max-width:420px;padding:40px;box-shadow:0 24px 60px rgba(0,0,0,0.3)}
.logo-badge{background:#c9a84c;color:#1a1a2e;font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:1px;display:inline-block;margin-bottom:12px}
h1{font-family:"DM Serif Display",serif;font-size:26px;color:#1a1a2e;margin-bottom:4px}
.sub{font-size:13px;color:#6b7280;margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:#374151;margin-bottom:6px}
.field input{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:9px;font-family:"DM Sans",sans-serif;font-size:14px;color:#111;outline:none;transition:border-color 0.2s}
.field input:focus{border-color:#c9a84c;box-shadow:0 0 0 3px rgba(201,168,76,0.1)}
.btn{width:100%;padding:13px;background:#1a1a2e;color:#fff;border:none;border-radius:9px;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.2s;margin-top:4px}
.btn:hover{background:#2d2d4e}
.btn:disabled{opacity:0.7;cursor:default}
.err{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;color:#991b1b;margin-bottom:16px;display:none}
.foot{text-align:center;font-size:12px;color:#9ca3af;margin-top:20px}
</style>
</head>
<body>
<div class="card">
  <div class="logo-badge">PKP</div>
  <h1>Welcome Back</h1>
  <div class="sub">Sign in to Pratapkaran Paul &amp; Co. Reimbursement</div>
  <div class="err" id="err"></div>
  <div class="field">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="pwd" placeholder="Enter your password" autocomplete="current-password">
  </div>
  <button class="btn" id="loginBtn">Sign In</button>
  <div class="foot">Contact your administrator for access</div>
</div>
<script>
var API = "https://script.google.com/macros/s/AKfycbwIXyfDZ1qluP1n164k8O7x2iPexGiH5xPZrqI_9alXAtdcRC4L5yLkz5ZclDRIYCjesw/exec";

document.getElementById("loginBtn").addEventListener("click", doLogin);
document.addEventListener("keydown", function(e){ if(e.key==="Enter") doLogin(); });

function doLogin() {
  var email = document.getElementById("email").value.trim().toLowerCase();
  var pwd   = document.getElementById("pwd").value.trim();
  var err   = document.getElementById("err");
  var btn   = document.getElementById("loginBtn");

  err.style.display = "none";
  if (!email || !pwd) { showErr("Please enter email and password."); return; }

  btn.disabled = true;
  btn.textContent = "Signing in...";

  jsonp({ action:"login", email:email, password:pwd }, function(res) {
    btn.disabled = false;
    btn.textContent = "Sign In";
    if (res.error) { showErr(res.error); return; }
    sessionStorage.setItem("pkp_token", res.token);
    sessionStorage.setItem("pkp_user",  JSON.stringify(res.user));
    window.location.href = "app.html";
  });
}

function showErr(msg) {
  var el = document.getElementById("err");
  el.textContent = msg;
  el.style.display = "block";
}

function jsonp(params, cb) {
  var name = "cb" + Date.now();
  var done = false;
  var timer = setTimeout(function(){
    if(!done){done=true;cleanup();cb({error:"Connection timed out. Please try again."});}
  }, 20000);
  function cleanup(){ delete window[name]; var s=document.getElementById(name); if(s&&s.parentNode) s.parentNode.removeChild(s); }
  window[name] = function(data){ if(!done){done=true;clearTimeout(timer);cleanup();cb(data);} };
  var q = "callback="+encodeURIComponent(name);
  for(var k in params){ if(Object.prototype.hasOwnProperty.call(params,k)) q+="&"+encodeURIComponent(k)+"="+encodeURIComponent(params[k]); }
  var sc = document.createElement("script");
  sc.id = name;
  sc.src = API+"?"+q;
  sc.onerror = function(){ if(!done){done=true;clearTimeout(timer);cleanup();cb({error:"Could not connect. Check internet connection."});} };
  document.body.appendChild(sc);
}
</script>
</body>
</html>
