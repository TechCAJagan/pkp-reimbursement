<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PKP — Claims Report</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Palatino Linotype","Palatino","Book Antiqua",serif;color:#1a1a2e;background:#fff;padding:24px}
.no-print{margin-bottom:20px;display:flex;gap:10px;align-items:center}
.no-print button{padding:9px 20px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s}
.btn-print{background:#1a1a2e;color:#fff}
.btn-print:hover{background:#2d2d4e}
.btn-close{background:#f4f4f8;color:#1a1a2e;border:1.5px solid #dddde8!important}
.no-print .hint{font-size:12px;color:#7070a0;font-style:italic}

/* ── PAGE ── */
.page{max-width:960px;margin:0 auto}

/* ── HEADER ── */
.firm-header{display:flex;align-items:flex-start;justify-content:space-between;border-bottom:3px solid #1a1a2e;padding-bottom:14px;margin-bottom:18px}
.firm-left{}
.firm-name{font-size:20px;font-weight:700;color:#1a1a2e;letter-spacing:0.02em}
.firm-sub{font-size:10px;color:#7070a0;letter-spacing:0.14em;text-transform:uppercase;margin-top:3px}
.firm-right{text-align:right}
.report-title{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.report-meta{font-size:11px;color:#7070a0}
.gold-line{height:3px;background:linear-gradient(90deg,#c9a84c,#e8c96a,#c9a84c);border-radius:2px;margin-bottom:16px}

/* ── STATS ── */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-bottom:16px;border:1px solid #dddde8;border-radius:8px;overflow:hidden}
.stat-box{padding:10px 14px;border-right:1px solid #dddde8}
.stat-box:last-child{border-right:none}
.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:#7070a0;margin-bottom:3px}
.stat-val{font-size:16px;font-weight:700;color:#1a1a2e}
.stat-val.gold{color:#c9a84c}
.stat-val.green{color:#0a5c36}

/* ── NOTE ── */
.att-note{background:#fef9ec;border-left:3px solid #c9a84c;padding:7px 12px;font-size:10px;color:#7a4f00;margin-bottom:12px;border-radius:0 6px 6px 0;font-style:italic}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;margin-bottom:18px;font-size:11px;table-layout:fixed}
thead tr{background:#1a1a2e}
th{color:#fff;padding:8px 7px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:0.07em;font-weight:600;border-right:1px solid rgba(255,255,255,.12);vertical-align:middle}
th:last-child{border-right:none}
/* Column widths */
.col-no{width:24px}
.col-claim{width:148px}
.col-client{width:90px}
.col-class{width:100px}
.col-desc{width:185px}
.col-amt{width:70px;text-align:right!important}
.col-status{width:90px}
.col-att{width:85px}

td{padding:0;vertical-align:top;border-bottom:0.5px solid #dddde8;border-right:0.5px solid #dddde8}
td:last-child{border-right:none}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#f8f8fc}
tr.total-row td{background:#eeeef8!important;border-top:2px solid #1a1a2e}

.cell{padding:6px 7px}
.cid{font-family:monospace;font-size:9px;background:#eeeef8;color:#2d2d4e;padding:1px 5px;border-radius:3px;font-weight:600;display:inline-block;margin-bottom:2px}
.emp-name{font-size:11px;font-weight:600;color:#1a1a2e;margin-bottom:1px}
.emp-meta{font-size:9px;color:#7070a0;line-height:1.4}
.maj-head{font-size:11px;font-weight:600;color:#1a1a2e;margin-bottom:2px}
.min-nat{font-size:9px;color:#7070a0;line-height:1.5}
.desc-text{font-size:10px;color:#1a1a2e;line-height:1.5;margin-bottom:2px}
.sub-text{font-size:9px;color:#7070a0;line-height:1.4}
.amt{font-weight:700;font-size:12px;text-align:right;display:block}
.total-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#7070a0;text-align:right;padding:7px}
.total-amt{font-size:14px;font-weight:700;color:#1a1a2e;text-align:right;padding:7px}
.att-ref{font-family:monospace;font-size:9px;color:#7070a0}
.att-blank{font-size:9px;color:#ccc;font-style:italic;border-bottom:1px solid #dddde8;padding-bottom:2px;display:block;min-width:60px}

/* badge */
.badge{display:inline-block;padding:2px 6px;border-radius:10px;font-size:9px;font-weight:600}
.b-pm{background:#fef9ec;color:#7a4f00}
.b-pf{background:#dbeafe;color:#1e40af}
.b-af{background:#e8f8f0;color:#0a5c36}
.b-rej{background:#fdf2f2;color:#8b1a1a}
.b-paid{background:#e8f8f0;color:#0a5c36}

/* ── SUMMARY ── */
.summary-section{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.sum-card{border:1px solid #dddde8;border-radius:8px;overflow:hidden}
.sum-card-hdr{background:#1a1a2e;color:#fff;padding:6px 12px;font-size:9px;text-transform:uppercase;letter-spacing:0.08em;font-weight:600}
.sum-table{width:100%;border-collapse:collapse;font-size:11px}
.sum-table td{padding:5px 12px;border-bottom:0.5px solid #dddde8;color:#1a1a2e}
.sum-table td:last-child{text-align:right;font-weight:600}
.sum-table tr:last-child td{font-weight:700;border-top:2px solid #1a1a2e;background:#eeeef8;border-bottom:none;font-size:12px}
.sum-table tr:nth-child(even) td{background:#f8f8fc}

/* ── SIGNATURES ── */
.sign-section{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin-top:24px;padding-top:14px;border-top:1px solid #dddde8}
.sign-box{text-align:center}
.sign-line{border-top:1px solid #1a1a2e;margin-bottom:5px;margin-top:36px}
.sign-role{font-size:11px;font-weight:600;color:#1a1a2e}
.sign-sub{font-size:9px;color:#7070a0;margin-top:2px}

/* ── FOOTER ── */
.doc-footer{margin-top:16px;padding-top:8px;border-top:1px solid #dddde8;display:flex;justify-content:space-between;font-size:9px;color:#9090b0}

/* ── PRINT ── */
@media print{
  .no-print{display:none!important}
  body{padding:10px}
  .stat-box,.sum-card-hdr,thead tr,.total-row td,.sum-table tr:last-child td{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  tr{page-break-inside:avoid}
  .summary-section{page-break-inside:avoid}
  .sign-section{page-break-inside:avoid}
}
</style>
</head>
<body>

<div class="no-print">
  <button class="btn-print" onclick="window.print()">🖨️ Print / Save PDF</button>
  <button class="btn-close" onclick="window.close()">✖ Close</button>
  <span class="hint">To save as PDF: choose "Save as PDF" in the print dialog</span>
</div>

<div class="page" id="page">
  <div style="text-align:center;padding:60px;color:#7070a0">Loading report...</div>
</div>

<script>
var data=[], title="Claims Report", user={};
try{ data=JSON.parse(sessionStorage.getItem("printReportData")||"[]"); }catch(e){}
try{ title=sessionStorage.getItem("printReportTitle")||"Claims Report"; }catch(e){}
try{ user=JSON.parse(sessionStorage.getItem("pkp_user")||"{}"); }catch(e){}

function fmtD(d){if(!d||d==="-")return "-";try{return new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});}catch(e){return d;}}
function fmtA(n){var v=parseFloat(n)||0;return "Rs.\u00a0"+v.toLocaleString("en-IN",{minimumFractionDigits:2});}
function getStatus(c){return c.FinanceApprovalStatus&&c.FinanceApprovalStatus!=="PENDING"?c.FinanceApprovalStatus:c.ManagerApprovalStatus||"PENDING_MANAGER";}
function getStatusLabel(s){var m={PENDING_MANAGER:"Pending Manager",PENDING_FINANCE:"Pending Finance",APPROVED_FINANCE:"Finance Approved",REJECTED_MANAGER:"Rejected",REJECTED_FINANCE:"Fin.Rejected",PAID:"Paid",CLOSED:"Closed"};return m[s]||s||"-";}
function getBadgeCls(s){var m={PENDING_MANAGER:"b-pm",PENDING_FINANCE:"b-pf",APPROVED_FINANCE:"b-af",REJECTED_MANAGER:"b-rej",REJECTED_FINANCE:"b-rej",PAID:"b-paid",CLOSED:"b-paid"};return m[s]||"b-pm";}
function esc(t){return String(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function render(){
  if(!data.length){
    document.getElementById("page").innerHTML="<div style='text-align:center;padding:60px;color:#8b1a1a'>No data. Please select claims first.</div>";
    return;
  }
  var total=0, catTotals={}, clientTotals={};
  for(var i=0;i<data.length;i++){
    var amt=parseFloat(data[i].Amount)||0; total+=amt;
    var cat=data[i].Category||"Uncategorised";
    catTotals[cat]=(catTotals[cat]||0)+amt;
    var cli=data[i].ClientName||"General";
    clientTotals[cli]=(clientTotals[cli]||0)+amt;
  }
  var approved=data.filter(function(c){var s=getStatus(c);return s==="APPROVED_FINANCE"||s==="PAID";}).length;
  var pending=data.filter(function(c){var s=getStatus(c);return s==="PENDING_MANAGER"||s==="PENDING_FINANCE";}).length;
  var printDate=new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"long",year:"numeric"});
  var printTime=new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});

  var h="";

  // Header
  h+="<div class='firm-header'>";
  h+="<div class='firm-left'><div class='firm-name'>Pratapkaran Paul &amp; Co.</div><div class='firm-sub'>Chartered Accountants &amp; Associates</div></div>";
  h+="<div class='firm-right'><div class='report-title'>"+esc(title)+"</div><div class='report-meta'>Prepared by: "+(esc(user.name)||"System")+"<br>Printed: "+printDate+" at "+printTime+"</div></div>";
  h+="</div>";
  h+="<div class='gold-line'></div>";

  // Stats
  h+="<div class='stats-bar'>";
  h+="<div class='stat-box'><div class='stat-lbl'>Total Claims</div><div class='stat-val'>"+data.length+"</div></div>";
  h+="<div class='stat-box'><div class='stat-lbl'>Total Amount</div><div class='stat-val gold'>"+fmtA(total)+"</div></div>";
  h+="<div class='stat-box'><div class='stat-lbl'>Approved</div><div class='stat-val green'>"+approved+"</div></div>";
  h+="<div class='stat-box'><div class='stat-lbl'>Pending</div><div class='stat-val'>"+pending+"</div></div>";
  h+="</div>";

  // Attachment note
  h+="<div class='att-note'>* Attachment Ref. column — enter reference number manually before printing if the document was submitted separately.</div>";

  // Table
  h+="<table><thead><tr>";
  h+="<th class='col-no'>#</th>";
  h+="<th class='col-claim'>Claim / Employee</th>";
  h+="<th class='col-client'>Client</th>";
  h+="<th class='col-class'>Classification</th>";
  h+="<th class='col-desc'>Description &amp; Sub-nature</th>";
  h+="<th class='col-amt' style='text-align:right'>Amount</th>";
  h+="<th class='col-status'>Status</th>";
  h+="<th class='col-att'>Attachment Ref.</th>";
  h+="</tr></thead><tbody>";

  for(var i=0;i<data.length;i++){
    var c=data[i]; var s=getStatus(c); var bc=getBadgeCls(s);
    h+="<tr>";
    // Serial
    h+="<td><div class='cell' style='color:#9090b0;font-size:10px;text-align:center'>"+(i+1)+"</div></td>";
    // Claim / Employee
    h+="<td><div class='cell'><span class='cid'>"+esc(c.ClaimID)+"</span><div class='emp-name'>"+esc(c.ClaimantName||c.ClaimantID||"-")+"</div><div class='emp-meta'>"+fmtD(c.DateOfExpense)+" &nbsp;&middot;&nbsp; "+esc(c.Category||"-")+"</div></div></td>";
    // Client
    h+="<td><div class='cell' style='font-size:11px;color:#1a1a2e'>"+esc(c.ClientName||"-")+"</div></td>";
    // Classification
    h+="<td><div class='cell'><div class='maj-head'>"+esc(c.MajorHead||"-")+"</div><div class='min-nat'>"+esc(c.MinorHead||"")+(c.Nature?"<br>"+esc(c.Nature):"")+"</div></div></td>";
    // Description & Sub-nature
    h+="<td><div class='cell'><div class='desc-text'>"+esc(c.Description||"-")+"</div>"+(c.SubNature?"<div class='sub-text'>Sub: "+esc(c.SubNature)+"</div>":"")+"</div></td>";
    // Amount
    h+="<td><div class='cell'><span class='amt'>"+fmtA(c.Amount)+"</span></div></td>";
    // Status
    h+="<td><div class='cell'><span class='badge "+bc+"'>"+getStatusLabel(s)+"</span></div></td>";
    // Attachment
    h+="<td><div class='cell'>"+(c.AttachmentRef?"<span class='att-ref'>"+esc(c.AttachmentRef)+"</span>":"<span class='att-blank'>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>")+"</div></td>";
    h+="</tr>";
  }

  // Total row
  h+="<tr class='total-row'>";
  h+="<td colspan='5'><div class='total-lbl'>Grand Total</div></td>";
  h+="<td><div class='cell'><span class='amt'>"+fmtA(total)+"</span></div></td>";
  h+="<td colspan='2'><div class='cell'></div></td>";
  h+="</tr>";
  h+="</tbody></table>";

  // Summary
  h+="<div class='summary-section'>";
  // Category
  h+="<div class='sum-card'><div class='sum-card-hdr'>Summary by Category</div><table class='sum-table'>";
  for(var cat in catTotals) h+="<tr><td>"+esc(cat)+"</td><td>"+fmtA(catTotals[cat])+"</td></tr>";
  h+="<tr><td>Grand Total</td><td>"+fmtA(total)+"</td></tr></table></div>";
  // Client
  h+="<div class='sum-card'><div class='sum-card-hdr'>Summary by Client</div><table class='sum-table'>";
  var ckeys=Object.keys(clientTotals).slice(0,8);
  for(var ci=0;ci<ckeys.length;ci++) h+="<tr><td>"+esc(ckeys[ci])+"</td><td>"+fmtA(clientTotals[ckeys[ci]])+"</td></tr>";
  if(Object.keys(clientTotals).length>8) h+="<tr><td colspan='2' style='color:#9090b0;font-size:9px'>...and "+(Object.keys(clientTotals).length-8)+" more</td></tr>";
  h+="<tr><td>Grand Total</td><td>"+fmtA(total)+"</td></tr></table></div>";
  h+="</div>";

  // Signatures
  h+="<div class='sign-section'>";
  h+="<div class='sign-box'><div class='sign-line'></div><div class='sign-role'>"+(esc(user.name)||"Prepared by")+"</div><div class='sign-sub'>Prepared by</div></div>";
  h+="<div class='sign-box'><div class='sign-line'></div><div class='sign-role'>&nbsp;</div><div class='sign-sub'>Verified by</div></div>";
  h+="<div class='sign-box'><div class='sign-line'></div><div class='sign-role'>&nbsp;</div><div class='sign-sub'>Authorised by</div></div>";
  h+="</div>";

  // Footer
  h+="<div class='doc-footer'><span>Pratapkaran Paul &amp; Co. | Reimbursement Management System | Powered by CA. Jagan A.</span><span>"+data.length+" claims | "+fmtA(total)+" | Generated "+printDate+"</span></div>";

  document.getElementById("page").innerHTML=h;
  setTimeout(function(){window.print();},600);
}

render();
</script>
</body>
</html>
