<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PKP — Claims Report</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Palatino Linotype","Palatino","Book Antiqua",serif;color:#1a1a2e;background:#fff;padding:24px}
.no-print{margin-bottom:16px;display:flex;gap:10px}
.no-print button{padding:9px 20px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none}
.btn-print{background:#1a1a2e;color:#fff}
.btn-print:hover{background:#2d2d4e}
.btn-close{background:#f4f4f8;color:#1a1a2e;border:1px solid #dddde8!important}
.page{max-width:960px;margin:0 auto}

/* Header */
.firm-header{text-align:center;border-bottom:3px solid #1a1a2e;padding-bottom:16px;margin-bottom:20px}
.firm-name{font-size:22px;font-weight:700;color:#1a1a2e;letter-spacing:0.02em}
.firm-sub{font-size:11px;color:#7070a0;letter-spacing:0.12em;text-transform:uppercase;margin-top:3px}
.report-title{font-size:17px;font-weight:600;color:#1a1a2e;margin-top:10px}
.report-meta{display:flex;justify-content:space-between;font-size:11px;color:#7070a0;margin-top:6px}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-box{background:#f4f4f8;border-radius:8px;padding:12px 16px;border-left:3px solid #1a1a2e}
.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:#7070a0;margin-bottom:4px}
.stat-val{font-size:18px;font-weight:700;color:#1a1a2e}
.stat-val.gold{color:#c9a84c}

/* Table */
table{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:12px}
thead tr{background:#1a1a2e}
th{color:#fff;padding:8px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;font-weight:600;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid #ededf4;vertical-align:top}
tr:nth-child(even) td{background:#f8f8fc}
.total-row td{font-weight:700;border-top:2px solid #1a1a2e;background:#eeeef8!important;font-size:13px}
.mono{font-family:monospace;font-size:11px;color:#7070a0}
.amt{font-weight:600;text-align:right}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.b-pm{background:#fef9ec;color:#7a4f00}
.b-pf{background:#dbeafe;color:#1e40af}
.b-af{background:#e8f8f0;color:#0a5c36}
.b-rej{background:#fdf2f2;color:#8b1a1a}
.b-paid{background:#e8f8f0;color:#0a5c36}

/* Summary section */
.summary-section{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.sum-card{border:1px solid #dddde8;border-radius:8px;overflow:hidden}
.sum-card-title{background:#1a1a2e;color:#fff;padding:7px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em}
.sum-table{width:100%;border-collapse:collapse;font-size:12px}
.sum-table td{padding:6px 12px;border-bottom:1px solid #ededf4}
.sum-table tr:last-child td{font-weight:700;border-top:2px solid #1a1a2e;background:#eeeef8;border-bottom:none}
.sum-table td:last-child{text-align:right;font-weight:600}

/* Signatures */
.sign-section{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin-top:24px;padding-top:16px;border-top:1px solid #dddde8}
.sign-box{text-align:center}
.sign-line{border-top:1px solid #1a1a2e;margin-bottom:6px;margin-top:40px}
.sign-name{font-size:12px;font-weight:600;color:#1a1a2e}
.sign-role{font-size:10px;color:#7070a0;margin-top:2px}

/* Footer */
.doc-footer{margin-top:20px;padding-top:10px;border-top:1px solid #dddde8;display:flex;justify-content:space-between;font-size:9px;color:#9090b0}

@media print{
  .no-print{display:none!important}
  body{padding:12px}
  .stat-box{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  thead tr{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .sum-card-title{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  tr{page-break-inside:avoid}
  .summary-section{page-break-inside:avoid}
  .sign-section{page-break-inside:avoid}
}
</style>
</head>
<body>
<div class="no-print">
  <button class="btn-print" onclick="window.print()">🖨️ Print / Save PDF</button>
  <button class="btn-close" onclick="window.close()">✖ Close</button>
</div>

<div class="page" id="page">
  <div style="text-align:center;padding:60px;color:#7070a0">Loading report...</div>
</div>

<script>
var data = [];
var title = "Claims Report";

try {
  data  = JSON.parse(sessionStorage.getItem("printReportData") || "[]");
  title = sessionStorage.getItem("printReportTitle") || "Claims Report";
} catch(e) {}

var user = {};
try { user = JSON.parse(sessionStorage.getItem("pkp_user") || "{}"); } catch(e) {}

function fmtD(d){ if(!d||d==="-") return "-"; try{ return new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}); }catch(e){return d;} }
function fmtA(n){ var v=parseFloat(n)||0; return "Rs.\u00a0"+v.toLocaleString("en-IN",{minimumFractionDigits:2}); }
function getStatus(c){ return c.FinanceApprovalStatus&&c.FinanceApprovalStatus!=="PENDING"?c.FinanceApprovalStatus:c.ManagerApprovalStatus||"PENDING_MANAGER"; }
function getStatusLabel(s){ var m={PENDING_MANAGER:"Pending Manager",PENDING_FINANCE:"Pending Finance",APPROVED_FINANCE:"Finance Approved",REJECTED_MANAGER:"Rejected",REJECTED_FINANCE:"Fin.Rejected",PAID:"Paid",CLOSED:"Closed"}; return m[s]||s||"-"; }
function getBadgeCls(s){ var m={PENDING_MANAGER:"b-pm",PENDING_FINANCE:"b-pf",APPROVED_FINANCE:"b-af",REJECTED_MANAGER:"b-rej",REJECTED_FINANCE:"b-rej",PAID:"b-paid",CLOSED:"b-paid"}; return m[s]||"b-pm"; }

function render() {
  if (!data.length) {
    document.getElementById("page").innerHTML = "<div style='text-align:center;padding:60px;color:#8b1a1a'>No data to display. Please select claims first.</div>";
    return;
  }

  // Compute totals
  var total = 0;
  var catTotals = {}, clientTotals = {}, statusCount = {};
  for (var i = 0; i < data.length; i++) {
    var amt = parseFloat(data[i].Amount) || 0; total += amt;
    var cat = data[i].Category || "Uncategorised";
    catTotals[cat] = (catTotals[cat] || 0) + amt;
    var cli = data[i].ClientName || "General";
    clientTotals[cli] = (clientTotals[cli] || 0) + amt;
    var st = getStatus(data[i]);
    statusCount[st] = (statusCount[st] || 0) + 1;
  }

  var printDate = new Date().toLocaleDateString("en-IN", {day:"2-digit",month:"long",year:"numeric"});
  var printTime = new Date().toLocaleTimeString("en-IN", {hour:"2-digit",minute:"2-digit"});

  var html = "";

  // ── HEADER ──
  html += "<div class='firm-header'>";
  html += "<div class='firm-name'>Pratapkaran Paul &amp; Co.</div>";
  html += "<div class='firm-sub'>Chartered Accountants</div>";
  html += "<div class='report-title'>" + title + "</div>";
  html += "<div class='report-meta'><span>Prepared by: " + (user.name||"System") + "</span><span>Printed: " + printDate + " at " + printTime + "</span></div>";
  html += "</div>";

  // ── STATS BAR ──
  var approved = data.filter(function(c){return getStatus(c)==="APPROVED_FINANCE"||getStatus(c)==="PAID";}).length;
  var pending  = data.filter(function(c){var s=getStatus(c);return s==="PENDING_MANAGER"||s==="PENDING_FINANCE";}).length;
  html += "<div class='stats-bar'>";
  html += "<div class='stat-box'><div class='stat-lbl'>Total Claims</div><div class='stat-val'>"+data.length+"</div></div>";
  html += "<div class='stat-box'><div class='stat-lbl'>Total Amount</div><div class='stat-val gold'>"+fmtA(total)+"</div></div>";
  html += "<div class='stat-box'><div class='stat-lbl'>Approved</div><div class='stat-val'>"+approved+"</div></div>";
  html += "<div class='stat-box'><div class='stat-lbl'>Pending</div><div class='stat-val'>"+pending+"</div></div>";
  html += "</div>";

  // ── CLAIMS TABLE ──
  html += "<table><thead><tr>";
  html += "<th>#</th><th>Claim ID</th><th>Employee</th><th>Date</th><th>Client</th><th>Major Head</th><th>Category</th><th style='text-align:right'>Amount</th><th>Status</th>";
  html += "</tr></thead><tbody>";
  for (var i = 0; i < data.length; i++) {
    var c = data[i]; var s = getStatus(c);
    html += "<tr>";
    html += "<td style='color:#9090b0;font-size:11px'>"+(i+1)+"</td>";
    html += "<td class='mono'>"+c.ClaimID+"</td>";
    html += "<td>"+(c.ClaimantName||c.ClaimantID||"-")+"</td>";
    html += "<td style='white-space:nowrap'>"+fmtD(c.DateOfExpense)+"</td>";
    html += "<td>"+(c.ClientName||"-")+"</td>";
    html += "<td>"+(c.MajorHead||"-")+(c.MinorHead?"<br><span style='font-size:10px;color:#9090b0'>"+c.MinorHead+"</span>":"")+"</td>";
    html += "<td style='font-size:11px;color:#7070a0'>"+(c.Category||"-")+"</td>";
    html += "<td class='amt'>"+fmtA(c.Amount)+"</td>";
    html += "<td><span class='badge "+getBadgeCls(s)+"'>"+getStatusLabel(s)+"</span></td>";
    html += "</tr>";
  }
  html += "<tr class='total-row'><td colspan='7' style='text-align:right'>Grand Total</td><td class='amt'>"+fmtA(total)+"</td><td></td></tr>";
  html += "</tbody></table>";

  // ── SUMMARY SECTION ──
  html += "<div class='summary-section'>";

  // Category summary
  html += "<div class='sum-card'><div class='sum-card-title'>Summary by Category</div><table class='sum-table'>";
  for (var cat in catTotals) html += "<tr><td>"+cat+"</td><td>"+fmtA(catTotals[cat])+"</td></tr>";
  html += "<tr><td>Grand Total</td><td>"+fmtA(total)+"</td></tr></table></div>";

  // Client summary
  html += "<div class='sum-card'><div class='sum-card-title'>Summary by Client</div><table class='sum-table'>";
  var clientKeys = Object.keys(clientTotals).slice(0,8); // max 8 clients on print
  for (var ci=0; ci<clientKeys.length; ci++) html += "<tr><td>"+clientKeys[ci]+"</td><td>"+fmtA(clientTotals[clientKeys[ci]])+"</td></tr>";
  if(Object.keys(clientTotals).length > 8) html += "<tr><td colspan='2' style='color:#9090b0;font-size:10px'>...and "+(Object.keys(clientTotals).length-8)+" more</td></tr>";
  html += "<tr><td>Grand Total</td><td>"+fmtA(total)+"</td></tr></table></div>";

  html += "</div>";

  // ── SIGNATURES ──
  html += "<div class='sign-section'>";
  html += "<div class='sign-box'><div class='sign-line'></div><div class='sign-name'>"+(user.name||"")+"</div><div class='sign-role'>Prepared by</div></div>";
  html += "<div class='sign-box'><div class='sign-line'></div><div class='sign-name'>&nbsp;</div><div class='sign-role'>Verified by</div></div>";
  html += "<div class='sign-box'><div class='sign-line'></div><div class='sign-name'>&nbsp;</div><div class='sign-role'>Authorised by</div></div>";
  html += "</div>";

  // ── FOOTER ──
  html += "<div class='doc-footer'><span>Pratapkaran Paul &amp; Co. | Reimbursement Management System | Powered by CA. Jagan A.</span><span>"+data.length+" claims | "+fmtA(total)+" total | Generated "+printDate+"</span></div>";

  document.getElementById("page").innerHTML = html;

  // Auto-open print dialog
  setTimeout(function(){ window.print(); }, 600);
}

render();
</script>
</body>
</html>
